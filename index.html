<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>暖屿小栈 · 治愈一刻</title>
    <!-- Google Fonts 圆润可爱字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (仅视觉装饰) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, #fffaf5 0%, #fff5f0 100%);
            color: #4a4a4a;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 28px;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }

        .hero {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }

        .hero-content {
            flex: 1;
            min-width: 260px;
            text-align: left;
        }

        /* 主标题 - 无任何上方多余元素 */
        .hero-content h1 {
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1.2;
            color: #5e3e2e;
            margin: 0;
        }

        .hero-content h1 span {
            background: linear-gradient(135deg, #f9b08c, #f27954);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 260px;
        }

        /* 动画卡片 - 保持治愈浮游感 */
        .cuddle-card {
            background: #ffece3;
            width: 280px;
            height: 280px;
            border-radius: 72% 28% 68% 32% / 32% 58% 42% 68%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 20px 22px 30px rgba(242, 139, 108, 0.15);
            animation: float 4s ease-in-out infinite;
            transition: transform 0.2s ease;
        }

        .cuddle-card i {
            font-size: 6rem;
            color: #f7a17b;
            margin-bottom: 16px;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.05));
        }

        .cuddle-card .cute-text {
            font-weight: 700;
            background: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1rem;
            color: #f28b6c;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            letter-spacing: 1px;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        footer {
            padding: 40px 0 30px;
            text-align: center;
            border-top: 2px solid #ffe2d4;
            color: #b28872;
            font-size: 0.9rem;
        }

        .footer-heart {
            color: #ff8a62;
        }

        /* 响应式调整：小屏幕时卡片在上，标题居中 */
        @media (max-width: 780px) {
            .hero {
                flex-direction: column-reverse;
                text-align: center;
            }
            .hero-content {
                text-align: center;
            }
            .hero-content h1 {
                font-size: 2.5rem;
            }
            .main-content {
                padding: 30px 0;
            }
            .cuddle-card {
                width: 260px;
                height: 260px;
            }
            .cuddle-card i {
                font-size: 5rem;
            }
        }
    </style>
</head>
<body>

<!-- 主要内容区：仅包含标题与动画卡片，标题上方无任何多余元素 -->
<div class="main-content">
    <div class="container">
        <div class="hero">
            <!-- 左侧：纯粹的主标题，无装饰文字、无badge、无任何多余代码 -->
            <div class="hero-content">
                <h1>让每一天都 <span>软软萌萌</span><br>简单又美好</h1>
            </div>
           
    </div>
</div>

<!-- 页脚区域：保留温暖基调 -->
<footer>
    <div class="container">
        <p>© 2025 暖屿·Kawaii Studio  |  用❤️和🐾编织的可爱角落  |  <span class="footer-heart">✦ 精简设计 ✦</span></p>
        <p style="margin-top: 12px; font-size: 0.8rem;">✨ 保持纯真，保持可爱 ✨</p>
    </div>
</footer>

</body>
</html>
