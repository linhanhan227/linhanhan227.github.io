<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>轻论坛 · 极简·纯粹</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #ffffff;
            color: #1e293b;
            line-height: 1.5;
        }

        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 28px;
        }

        /* 导航栏 - 仅保留Logo */
        .navbar {
            display: flex;
            justify-content: center;
            padding: 24px 0;
            border-bottom: 1px solid #f0f2f5;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #0f172a;
            text-decoration: none;
        }
        .logo i {
            color: #3b82f6;
            font-size: 1.7rem;
        }

        /* 英雄区 - 简约有力 */
        .hero {
            padding: 70px 0 50px;
            text-align: center;
            max-width: 780px;
            margin: 0 auto;
        }
        .hero-badge {
            background: #eef2ff;
            color: #1e40af;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 28px;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #0f172a, #2d3a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 1.2rem;
            color: #475569;
            margin-bottom: 32px;
        }
        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        .btn-outline {
            border: 1px solid #d1d9e8;
            background: transparent;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-outline:hover {
            border-color: #3b82f6;
            background: #f5f9ff;
            color: #2563eb;
        }

        /* 特性卡片 - 精简三列 */
        .features {
            margin: 40px 0 80px;
        }
        .section-title {
            text-align: center;
            font-size: 1.9rem;
            font-weight: 700;
            margin: 48px 0 12px;
        }
        .section-desc {
            text-align: center;
            color: #5b6b8c;
            margin-bottom: 48px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 32px;
        }
        .feature-card {
            background: #fafcff;
            border-radius: 28px;
            padding: 28px 20px;
            text-align: center;
            border: 1px solid #edf2f7;
            transition: all 0.2s;
            cursor: pointer;
        }
        .feature-card:hover {
            border-color: #cbdffc;
            box-shadow: 0 12px 20px -12px rgba(0,0,0,0.05);
        }
        .feature-icon {
            font-size: 2.4rem;
            color: #3b82f6;
            margin-bottom: 20px;
        }
        .feature-card h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }
        .feature-card p {
            color: #5c6b8c;
            font-size: 0.9rem;
        }

        @media (max-width: 700px) {
            .hero h1 {
                font-size: 2.2rem;
            }
            .hero p {
                font-size: 1rem;
            }
            .navbar {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 极简导航：仅保留Logo -->
    <nav class="navbar">
        <a href="#" class="logo" id="logoLink">
            <i class="fas fa-comment-dots"></i>
            <span>轻论坛</span>
        </a>
    </nav>

    <!-- 英雄区 -->
    <div class="hero">
        <div class="hero-badge"><i class="fas fa-feather-alt"></i> 极轻 · 极速</div>
        <h1>轻论坛<br>为纯粹交流而生</h1>
        <p>不冗余，不复杂。开箱即用的现代化社区引擎，<br>让每个想法都能轻松抵达。</p>
        <div class="hero-buttons">
            <button class="btn-primary" id="startHero">免费搭建社区</button>
            <button class="btn-outline" id="demoHero">查看演示</button>
        </div>
    </div>

    <!-- 三大特性 -->
    <div class="features">
        <div class="section-title">简洁，但足够强大</div>
        <div class="section-desc">核心功能聚焦沟通本质，去除冗余干扰</div>
        <div class="grid-3">
            <div class="feature-card" data-feature="毫秒级响应">
                <div class="feature-icon"><i class="fas fa-bolt"></i></div>
                <h3>毫秒级响应</h3>
                <p>轻量架构，资源占用减少60%，访问丝滑流畅</p>
            </div>
            <div class="feature-card" data-feature="简约主题">
                <div class="feature-icon"><i class="fas fa-palette"></i></div>
                <h3>简约主题</h3>
                <p>内置多款极简皮肤，一键切换，专注内容本身</p>
            </div>
            <div class="feature-card" data-feature="安全守护">
                <div class="feature-icon"><i class="fas fa-shield-heart"></i></div>
                <h3>安全守护</h3>
                <p>智能风控 + 数据加密，纯净社区氛围</p>
            </div>
        </div>
    </div>
</div>

<script>
    // 简洁交互提示
    function showMsg(msg) {
        alert(`✨ 轻论坛 · ${msg}`);
    }

    // Logo 点击演示
    const logoLink = document.getElementById('logoLink');
    if (logoLink) {
        logoLink.addEventListener('click', (e) => {
            e.preventDefault();
            showMsg('轻论坛 · 回归纯粹交流');
        });
    }

    // 按钮事件
    const startBtn = document.getElementById('startHero');
    const demoBtn = document.getElementById('demoHero');

    if (startBtn) {
        startBtn.addEventListener('click', () => {
            showMsg('立即创建您的轻论坛社区，极速搭建');
        });
    }
    if (demoBtn) {
        demoBtn.addEventListener('click', () => {
            showMsg('演示模式即将上线，可先浏览官网');
        });
    }

    // 特性卡片点击
    const cards = document.querySelectorAll('.feature-card');
    cards.forEach(card => {
        card.addEventListener('click', () => {
            const title = card.querySelector('h3')?.innerText || '功能';
            showMsg(`「${title}」更多详情即将发布`);
        });
    });
</script>
</body>
</html>
