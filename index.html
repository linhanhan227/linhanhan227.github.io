<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>暖屿论坛 · 精简可爱风</title>
    <!-- Google Fonts 圆润可爱字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (免费图标库，仅作视觉装饰，无链接) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, #fffaf5 0%, #fff5f0 100%);
            color: #4a4a4a;
            line-height: 1.5;
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 28px;
        }

        /* 简单头部 - 只有logo，无导航栏 */
        .simple-header {
            padding: 32px 0 20px;
            text-align: center;
            border-bottom: 2px solid #ffe2d4;
            background-color: rgba(255, 250, 245, 0.6);
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 2rem;
            font-weight: 700;
            color: #f2a07e;
            letter-spacing: -0.5px;
        }

        .logo i {
            font-size: 2.2rem;
            filter: drop-shadow(2px 2px 6px rgba(242, 160, 126, 0.2));
        }

        .logo span {
            background: linear-gradient(135deg, #f9b28c, #f28b6c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* Hero 区域 */
        .hero {
            padding: 70px 0 100px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }

        .hero-content {
            flex: 1;
            min-width: 260px;
        }

        .hero-content .badge {
            background: #fff0e7;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #f28b6c;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .hero-content h1 {
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1.2;
            color: #5e3e2e;
            margin-bottom: 18px;
        }

        .hero-content h1 span {
            background: linear-gradient(135deg, #f9b08c, #f27954);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero-content p {
            font-size: 1.2rem;
            color: #7f6b60;
            margin-bottom: 32px;
            max-width: 480px;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-width: 260px;
            position: relative;
        }

        .cuddle-card {
            background: #ffece3;
            width: 280px;
            height: 280px;
            border-radius: 72% 28% 68% 32% / 32% 58% 42% 68%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 20px 22px 30px rgba(242, 139, 108, 0.15);
            animation: float 4s ease-in-out infinite;
        }

        .cuddle-card i {
            font-size: 6rem;
            color: #f7a17b;
            margin-bottom: 16px;
        }

        .cuddle-card .cute-text {
            font-weight: 700;
            background: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1rem;
            color: #f28b6c;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* 页脚 */
        footer {
            padding: 40px 0 30px;
            text-align: center;
            border-top: 2px solid #ffe2d4;
            margin-top: 20px;
            color: #b28872;
            font-size: 0.9rem;
        }

        .footer-heart {
            color: #ff8a62;
        }

        /* 响应式 */
        @media (max-width: 780px) {
            .hero {
                flex-direction: column-reverse;
                text-align: center;
                padding: 40px 0 70px;
            }
            .hero-content h1 {
                font-size: 2.5rem;
            }
        }

        /* 装饰小元素 */
        .deco-dot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            opacity: 0.5;
            pointer-events: none;
            font-size: 2rem;
            z-index: 99;
        }
    </style>
</head>
<body>

<!-- 可爱漂浮小点缀 (纯装饰) -->
<div class="deco-dot">
    ✨🐾
</div>

<!-- 简单头部，仅logo，无导航栏、无按钮 -->
<div class="simple-header">
    <div class="container">
        <div class="logo">
            <i class="fas fa-cat"></i>
            <span>暖屿·Kawaii</span>
        </div>
    </div>
</div>

<main>
    <!-- Hero 区域 - 无按钮 -->
    <div class="container">
        <div class="hero">
            <div class="hero-content">
                <div class="badge">
                    <i class="fas fa-star-of-life"></i> 全新可爱灵感
                </div>
                <h1>让每一天都 <span>软软萌萌</span><br>简单又美好</h1>
                <p>精简设计，温暖陪伴。我们用治愈系的创意与贴心的服务，为你打造会呼吸的可爱数字体验。</p>
                <!-- 无任何按钮 -->
            </div>
            <div class="hero-image">
                <div class="cuddle-card">
                    <i class="fas fa-paw"></i>
                    <div class="cute-text">♡ 今日好心情 ♡</div>
                </div>
            </div>
        </div>
    </div>
    <!-- 已移除“软萌”及以下所有区块（特色、团队成员、寄语区、联系区），只保留页脚 -->
</main>

<footer>
    <div class="container">
        <p>© 2025 暖屿·Kawaii Studio  |  用❤️和🐾编织的可爱角落  |  <span class="footer-heart">✦ 精简设计 ✦</span></p>
        <p style="margin-top: 12px; font-size: 0.8rem;">✨ 保持纯真，保持可爱 ✨</p>
    </div>
</footer>

</body>
</html>
